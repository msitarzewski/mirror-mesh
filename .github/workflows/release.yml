name: Release

# Why: tagged v* pushes ship a GitHub Release with bench artifacts, the
# notarized .app.zip (when credentials are configured), and the bench CLI
# binary — plus a release.json manifest with sha256s for Homebrew formulas.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bench-release:
    name: Build + Bench + Release (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode (latest-stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM build + dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Toolchain info
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

      - name: mirrormesh-selftest
        run: swift run mirrormesh-selftest

      - name: mirrormesh-bench (demo scenario)
        run: swift run mirrormesh-bench --scenario bench/scenarios/demo.json

      - name: Verify bench manifest
        run: |
          MANIFEST="$(ls -1t bench/out/demo_*.manifest.json | head -1)"
          swift run mirrormesh-verify --manifest "$MANIFEST"

      # Why: gate every signing step on all four secrets being present so
      # forks and unprivileged contributors still get a working release.
      - name: Detect notary credentials
        id: notary
        env:
          KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
          KEY_B64: ${{ secrets.APPLE_NOTARY_KEY_B64 }}
          TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          if [ -n "$KEY_ID" ] && [ -n "$ISSUER" ] && [ -n "$KEY_B64" ] && [ -n "$TEAM" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "[release] notary credentials present — will sign + notarize"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "[release] notary credentials missing — will publish unsigned .app.zip"
          fi

      - name: Install xcodegen
        if: steps.notary.outputs.enabled == 'true'
        run: brew install xcodegen

      - name: Write Local.xcconfig (team id)
        if: steps.notary.outputs.enabled == 'true'
        env:
          TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          cat > Local.xcconfig <<EOF
          DEVELOPMENT_TEAM = ${TEAM}
          CODE_SIGN_IDENTITY = Developer ID Application
          EOF

      - name: Generate Xcode project
        if: steps.notary.outputs.enabled == 'true'
        run: xcodegen generate

      - name: Import Developer ID certificate (placeholder)
        if: steps.notary.outputs.enabled == 'true'
        # Why: real signing requires the Developer ID Application .p12 in the
        # runner keychain. Maintainers add a `APPLE_CERT_P12_B64` +
        # `APPLE_CERT_P12_PASSWORD` step here when ready; until then,
        # archive runs with automatic signing and may fail on hosted runners.
        # The notarize.sh script itself doesn't care how the cert got there.
        run: |
          echo "[release] cert import step is a placeholder — see docs/notarization.md"

      - name: Store notarytool credentials
        if: steps.notary.outputs.enabled == 'true'
        env:
          KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
          KEY_B64: ${{ secrets.APPLE_NOTARY_KEY_B64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          KEY_PATH="$RUNNER_TEMP/notary/AuthKey.p8"
          echo "$KEY_B64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          xcrun notarytool store-credentials \
              --key "$KEY_PATH" \
              --key-id "$KEY_ID" \
              --issuer "$ISSUER" \
              mirrormesh-notary

      - name: Archive + notarize .app
        if: steps.notary.outputs.enabled == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          xcodebuild -project MirrorMesh.xcodeproj \
                     -scheme MirrorMesh \
                     -configuration Release \
                     archive -archivePath build/MirrorMesh.xcarchive
          bench/scripts/notarize.sh --archive build/MirrorMesh.xcarchive

      - name: Package release artifacts
        # Why: build a consistent set of artifacts regardless of whether
        # notarization ran. release.json has sha256s the Homebrew tap reads.
        run: |
          set -euo pipefail
          mkdir -p release-artifacts bench/out

          # Bench tarball (always)
          TAR="release-artifacts/mirrormesh-${GITHUB_REF_NAME}-bench.tar.gz"
          tar -czf "$TAR" bench/out
          echo "[release] $TAR"

          # mirrormesh-bench binary (always; built in release for distribution)
          swift build -c release --product mirrormesh-bench
          BENCH_BIN="$(swift build -c release --product mirrormesh-bench --show-bin-path)/mirrormesh-bench"
          BENCH_ZIP="release-artifacts/mirrormesh-bench-macos-arm64.zip"
          /usr/bin/ditto -c -k --keepParent "$BENCH_BIN" "$BENCH_ZIP"
          BENCH_SHA=$(shasum -a 256 "$BENCH_ZIP" | awk '{print $1}')
          echo "[release] $BENCH_ZIP sha256=$BENCH_SHA"

          # .app zip (notarized when secrets present, unsigned otherwise)
          APP_SHA=""
          APP_ZIP="release-artifacts/MirrorMesh-macos-arm64.zip"
          if [ -d "build/export/MirrorMesh.app" ]; then
            /usr/bin/ditto -c -k --keepParent "build/export/MirrorMesh.app" "$APP_ZIP"
            APP_SHA=$(shasum -a 256 "$APP_ZIP" | awk '{print $1}')
            echo "[release] $APP_ZIP sha256=$APP_SHA (notarized)"
          else
            echo "[release] no exported .app — skipping app zip (this is expected for unsigned builds)"
          fi

          python3 - "$BENCH_SHA" "$APP_SHA" "$GITHUB_REF_NAME" <<'PY'
          import json, os, sys
          bench_sha, app_sha, tag = sys.argv[1:4]
          os.makedirs("bench/out", exist_ok=True)
          rec = {
              "tag": tag,
              "bench_zip": "mirrormesh-bench-macos-arm64.zip",
              "bench_sha256": bench_sha,
              "app_zip": "MirrorMesh-macos-arm64.zip" if app_sha else None,
              "app_sha256": app_sha or None,
              "notarized": bool(app_sha),
          }
          with open("bench/out/release.json", "w") as f:
              json.dump(rec, f, indent=2)
              f.write("\n")
          print("[release] wrote bench/out/release.json")
          PY
          cp bench/out/release.json release-artifacts/release.json
          ls -la release-artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release-artifacts/
          retention-days: 90

      - name: Create GitHub Release
        # Why: pinned by major; softprops/action-gh-release@v2 is the current stable line.
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/release.json
