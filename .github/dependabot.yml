version: 2

# Why: keep GitHub Actions pinned-but-current. Swift/SPM ecosystem is not
# managed by Dependabot here (no Package.resolved dependencies yet).
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
      - "dependencies"
